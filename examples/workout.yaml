program:
  name: "برنامه قدرتی — محمد پاکدامن"
  name_en: "Strength Program — Mohammad Pakdaman"
  days:
    - name: "روز اول — سینه و جلو بازو"
      name_en: "Day 1 — Chest & Biceps"
      exercises:
        - name: "پرس سینه دستگاه"
          muscles: ["سینه بزرگ", "سه سر بازو", "دلتوئید جلو"]
          sets: 4
          reps: [12, 10, 8, 6]

        - name: "پرس بالا سینه دمبل"
          muscles: ["سینه بالایی", "دلتوئید جلو", "سه سر بازو"]
          sets: 4
          reps: [12, 10, 8, 6]

        - name: "باترفلای دستگاه"
          muscles: ["سینه بزرگ", "سینه داخلی"]
          sets: 3
          reps: 10

        - name: "پرس زیر سینه سیم‌کش ایستاده"
          muscles: ["سینه پایینی", "سه سر بازو"]
          sets: 2
          reps: [12, 10]
          superset_with: "دیپ پارالل"

        - name: "دیپ پارالل"
          muscles: ["سینه پایینی", "سه سر بازو", "دلتوئید جلو"]
          sets: 2
          reps: 12
          superset_with: "پرس زیر سینه سیم‌کش ایستاده"

        - name: "جلو بازو دمبل تناوبی روی میز بالا سینه"
          muscles: ["دو سر بازو", "براکیالیس"]
          sets: 3
          reps: 10

        - name: "جلو بازو دستگاه (پریچر کرل)"
          muscles: ["دو سر بازو", "براکیالیس", "براکیورادیالیس"]
          sets: 4
          reps: [12, 10, 8, 6]

        - name: "جلو بازو سیم‌کش ایستاده دست جمع"
          muscles: ["دو سر بازو", "قله دو سر"]
          sets: 3
          reps: [12, 10, 8]
          superset_with: "جلو بازو سیم‌کش مچ برعکس"

        - name: "جلو بازو سیم‌کش مچ برعکس"
          muscles: ["براکیورادیالیس", "ساعد"]
          sets: 3
          reps: [12, 10, 10]
          superset_with: "جلو بازو سیم‌کش ایستاده دست جمع"

    - name: "روز دوم — پا و پشت بازو"
      name_en: "Day 2 — Legs & Triceps"
      exercises:
        - name: "پرس پا دستگاه خوابیده پا باز"
          muscles: ["چهار سر ران", "سرینی", "همسترینگ"]
          sets: 3
          reps: [12, 10, 10]

        - name: "فول هاگ پا دستگاه پا باز"
          muscles: ["چهار سر ران", "سرینی بزرگ", "همسترینگ"]
          sets: 4
          reps: [12, 10, 8, 6]

        - name: "جلو پا دستگاه نشسته"
          muscles: ["چهار سر ران"]
          sets: 3
          reps: [12, 10, 8]
          superset_with: "پشت پا دستگاه خوابیده"

        - name: "پشت پا دستگاه خوابیده"
          muscles: ["همسترینگ", "ساق پا"]
          sets: 3
          reps: [10, 9, 8]
          superset_with: "جلو پا دستگاه نشسته"

        - name: "ددلیفت رومانیایی سیم‌کش پایین"
          muscles: ["همسترینگ", "سرینی بزرگ", "کمر پایین"]
          sets: 4
          reps: [12, 10, 8, 6]

        - name: "ساق پا دستگاه نشسته"
          muscles: ["ساق پا داخلی (سولئوس)"]
          sets: 3
          reps: [10, 9, 8]

        - name: "پشت بازو سیم‌کش ایستاده"
          muscles: ["سه سر بازو"]
          sets: 3
          reps: [10, 9, 8]

        - name: "پشت بازو دستگاه"
          muscles: ["سه سر بازو (سر بلند)"]
          sets: 3
          reps: [12, 10, 10]

        - name: "پشت بازو دمبل خوابیده تک بغل گوش"
          muscles: ["سه سر بازو (سر بلند)"]
          sets: 3
          reps: [12, 10, 10]
          superset_with: "پشت بازو سیم‌کش طنابی ایستاده"

        - name: "پشت بازو سیم‌کش طنابی ایستاده"
          muscles: ["سه سر بازو", "سر خارجی"]
          sets: 3
          reps: [20, 15, 10]
          superset_with: "پشت بازو دمبل خوابیده تک بغل گوش"

    - name: "روز سوم — شانه و پشت"
      name_en: "Day 3 — Shoulders & Back"
      exercises:
        - name: "پرس سرشانه دستگاه نشسته"
          muscles: ["دلتوئید جلو", "دلتوئید میانی", "سه سر بازو"]
          sets: 4
          reps: [12, 11, 10, 8]

        - name: "سرشانه نشر جانب دمبل ایستاده"
          muscles: ["دلتوئید میانی"]
          sets: 3
          reps: [12, 12, 10]

        - name: "سرشانه نشر از جلو دمبل چکشی متناوب نشسته"
          muscles: ["دلتوئید جلو"]
          sets: 3
          reps: 10

        - name: "شراگز دمبل از بغل"
          muscles: ["ذوزنقه بالایی"]
          sets: 3
          reps: [10, 9, 8]
          superset_with: "فلای معکوس دستگاه"

        - name: "فلای معکوس دستگاه"
          muscles: ["دلتوئید خلفی", "ذوزنقه میانی", "لوزی"]
          sets: 3
          reps: 10
          superset_with: "شراگز دمبل از بغل"

        - name: "زیر بغل قایقی تک دست چرخشی"
          muscles: ["پشتی بزرگ", "ذوزنقه", "بایسپس"]
          sets: 3
          reps: [10, 8, 8]
          superset_with: "زیر بغل قایقی دست باز"

        - name: "زیر بغل قایقی دست باز"
          muscles: ["پشتی بزرگ", "ذوزنقه میانی"]
          sets: 3
          reps: [10, 9, 8]
          superset_with: "زیر بغل قایقی تک دست چرخشی"

        - name: "لت از جلو دست باز"
          muscles: ["پشتی بزرگ", "ذوزنقه پایین"]
          sets: 3
          reps: [12, 10, 10]

        - name: "زیر بغل سیم‌کش هلالی تک دست"
          muscles: ["پشتی بزرگ", "دندانه‌ای جلو"]
          sets: 3
          reps: [12, 10, 8]
          superset_with: "زیر بغل دستگاه H"

        - name: "زیر بغل دستگاه H"
          muscles: ["پشتی بزرگ", "ذوزنقه میانی", "لوزی"]
          sets: 3
          reps: [10, 9, 8]
          superset_with: "زیر بغل سیم‌کش هلالی تک دست"
