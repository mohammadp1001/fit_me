program:
  name: "برنامه اصلاحی — محمد پاکدامن"
  name_en: "Corrective Program — Mohammad Pakdaman"
  days:

    # ──────────────────────────────────────────────────────────────
    # روز اول — اصلاح شانه، قفسه سینه و گردن
    # Day 1 — Shoulder, Chest & Neck Correction
    # ──────────────────────────────────────────────────────────────
    - name: "روز اول — شانه، قفسه سینه و گردن"
      name_en: "Day 1 — Shoulder, Chest & Neck"
      exercises:

        # کشش دیواری قفسه سینه — باز کردن سینه قبل از هر چیز
        - name: "کشش قفسه سینه به دیوار"
          muscles: ["سینه بزرگ", "دلتوئید جلو", "دوسر بازو"]
          sets: 3
          reps: 10

        # اسلاید دیوار — موبیلیتی شانه و اصلاح وضعیت
        - name: "اسلاید دیوار ایستاده"
          muscles: ["ذوزنقه پایین", "دندانه‌ای جلو", "دلتوئید خلفی"]
          sets: 3
          reps: 12

        # فیس پول سیم‌کش — تقویت پشت شانه و اصلاح گردگوش‌افتادگی
        - name: "فیس پول سیم‌کش"
          muscles: ["دلتوئید خلفی", "ذوزنقه میانی", "روتاتور کاف"]
          sets: 3
          reps: [15, 15, 12]

        # چرخش خارجی شانه دمبل خوابیده — تقویت روتاتور کاف
        - name: "چرخش خارجی شانه دمبل خوابیده"
          muscles: ["روتاتور کاف", "اینفرااسپیناتوس", "ترس مینور"]
          sets: 3
          reps: 12
          superset_with: "چرخش داخلی شانه دمبل خوابیده"

        - name: "چرخش داخلی شانه دمبل خوابیده"
          muscles: ["روتاتور کاف", "ساب‌اسکاپولاریس"]
          sets: 3
          reps: 12
          superset_with: "چرخش خارجی شانه دمبل خوابیده"

        # کشش گردن کناری — رفع گرفتگی ذوزنقه فوقانی
        - name: "کشش جانبی گردن"
          muscles: ["ذوزنقه بالایی", "لواتور اسکاپولا"]
          sets: 2
          reps: 10

        # پرنده معکوس دمبل — تقویت ذوزنقه میانی و لوزی
        - name: "پرنده معکوس دمبل خوابیده"
          muscles: ["دلتوئید خلفی", "ذوزنقه میانی", "لوزی"]
          sets: 3
          reps: [15, 12, 12]

    # ──────────────────────────────────────────────────────────────
    # روز دوم — اصلاح لگن، کمر و پا
    # Day 2 — Hip, Lower Back & Leg Correction
    # ──────────────────────────────────────────────────────────────
    - name: "روز دوم — لگن، کمر و پا"
      name_en: "Day 2 — Hip, Lower Back & Legs"
      exercises:

        # پل باسن — فعال‌سازی سرینی و کاهش فشار کمر
        - name: "پل باسن"
          muscles: ["سرینی بزرگ", "همسترینگ", "کمر پایین"]
          sets: 3
          reps: [15, 12, 12]

        # پل باسن تک‌پا — اصلاح عدم تقارن
        - name: "پل باسن تک پا"
          muscles: ["سرینی بزرگ", "همسترینگ", "مرکزی"]
          sets: 3
          reps: 10

        # کلمبل — فعال‌سازی سرینی میانی و اصلاح زانوی وارو
        - name: "کلمبل خوابیده"
          muscles: ["سرینی میانی", "سرینی کوچک", "پیریفورمیس"]
          sets: 3
          reps: [15, 15, 12]

        # کشش هیپ فلکسور — رفع کوتاهی خم‌کننده‌های لگن
        - name: "کشش هیپ فلکسور زانوزده"
          muscles: ["ایلیوپسواس", "رکتوس فموریس"]
          sets: 3
          reps: 10
          superset_with: "چرخش لگن خوابیده"

        # چرخش لگن — موبیلیتی مفصل ران
        - name: "چرخش لگن خوابیده"
          muscles: ["پیریفورمیس", "سرینی میانی", "کپسول مفصل ران"]
          sets: 3
          reps: 10
          superset_with: "کشش هیپ فلکسور زانوزده"

        # اسکوات دیوار — الگوی درست زانو و اصلاح ردیابی کشکک
        - name: "اسکوات دیوار"
          muscles: ["چهار سر ران", "سرینی بزرگ", "همسترینگ"]
          sets: 3
          reps: 12

        # بالا رفتن از پله — تقویت گلوت و کوادریسپس به‌صورت تابعی
        - name: "استپ آپ دمبل"
          muscles: ["سرینی بزرگ", "چهار سر ران", "همسترینگ"]
          sets: 3
          reps: 10

    # ──────────────────────────────────────────────────────────────
    # روز سوم — تثبیت مرکزی و ستون فقرات
    # Day 3 — Core Stability & Spine
    # ──────────────────────────────────────────────────────────────
    - name: "روز سوم — مرکزی و ستون فقرات"
      name_en: "Day 3 — Core Stability & Spine"
      exercises:

        # گربه‌گاو — موبیلیتی ستون فقرات
        - name: "حرکت گربه گاو"
          muscles: ["اکستنسورهای ستون فقرات", "مولتی‌فیدوس", "راست‌شکمی"]
          sets: 3
          reps: 12

        # دد باگ — تثبیت مرکزی بدون فشار کمری
        - name: "دد باگ"
          muscles: ["راست شکمی", "مورب شکمی", "مرکزی عمقی"]
          sets: 3
          reps: 10
          superset_with: "بردداگ"

        # بردداگ — تثبیت ستون فقرات در وضعیت چهاردست‌وپا
        - name: "بردداگ"
          muscles: ["مولتی‌فیدوس", "سرینی بزرگ", "مرکزی عمقی"]
          sets: 3
          reps: 10
          superset_with: "دد باگ"

        # پلانک — تثبیت عمومی مرکزی
        - name: "پلانک"
          muscles: ["مرکزی", "راست شکمی", "دلتوئید جلو", "چهار سر ران"]
          sets: 3
          reps: 30

        # پلانک کناری — تقویت مورب‌ها و سرینی میانی
        - name: "پلانک کناری"
          muscles: ["مورب شکمی", "سرینی میانی", "ربع‌نخاعی"]
          sets: 3
          reps: 20

        # کرانچ معکوس — اصلاح کج‌لگنی قدامی
        - name: "کرانچ معکوس"
          muscles: ["راست شکمی پایین", "ایلیوپسواس", "مورب شکمی"]
          sets: 3
          reps: [15, 12, 12]

        # هایپراکستنشن — تقویت عضلات خلفی ستون فقرات
        - name: "هایپراکستنشن دستگاه"
          muscles: ["اکستنسورهای ستون فقرات", "سرینی بزرگ", "همسترینگ"]
          sets: 3
          reps: [15, 12, 12]
